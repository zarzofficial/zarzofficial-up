<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Full background - no rounded corners so favicon fills completely -->
  <rect width="100" height="100" fill="#1a0a22"/>
  
  <!-- The rounded square frame (border) -->
  <rect x="4" y="4" width="92" height="92" rx="18" fill="#1a0a22" stroke="#c4b5fd" stroke-width="4"/>
  
  <!-- Arabic text زرز - centered and large to fill the frame -->
  <text
    x="50"
    y="67"
    font-family="Cairo, 'Arial Unicode MS', Arial, sans-serif"
    font-size="52"
    font-weight="900"
    text-anchor="middle"
    dominant-baseline="auto"
    fill="#c4b5fd"
  >زرز</text>
</svg>
