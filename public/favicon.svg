<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Dark background -->
  <rect width="512" height="512" rx="80" fill="#1a0a22"/>
  
  <!-- Outer rounded rectangle border (the frame) -->
  <rect x="32" y="32" width="448" height="448" rx="72" fill="none" stroke="#c4b5fd" stroke-width="22"/>
  
  <!-- Arabic text زرز using path approximation or text -->
  <text
    x="256"
    y="330"
    font-family="Cairo, Arial, sans-serif"
    font-size="240"
    font-weight="900"
    text-anchor="middle"
